<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Crop Yield Prediction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body {
        background-image: url("{{ url_for('static', filename='backgr.jpg') }}");
        background-size: cover;
        font-family: 'Arial', sans-serif;
        animation: fadeInBody 2s ease-in;
      }

      @keyframes fadeInBody {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      .container {
        background-color: rgba(0, 0, 0, 0.75);
        border-radius: 20px;
        padding: 40px;
        color: white;
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
        animation: slideUp 1.5s ease-in-out;
      }

      @keyframes slideUp {
        from { transform: translateY(100px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }

      .form-control {
        border-radius: 10px;
        margin-bottom: 20px;
      }

      .btn-danger {
        border-radius: 20px;
        padding: 15px 25px;
      }

      .prediction-container {
        background-color: rgba(255, 255, 255, 0.85);
        color: #222;
        padding: 30px;
        border-radius: 15px;
        margin-top: 30px;
        font-size: 24px;
        font-weight: bold;
        text-align: center;
        animation: fadeIn 1.5s ease-in-out;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
      }

      .error-message {
        background-color: rgba(255, 0, 0, 0.1);
        color: #ff4d4d;
        border: 1px solid #ff4d4d;
        padding: 20px;
        border-radius: 10px;
        font-weight: bold;
        margin-top: 20px;
        animation: fadeIn 1.5s ease-in-out;
      }
    </style>
  </head>
  <body>
    <div class="container my-5">
      <h1 class="text-center text-success mb-4">🌾 Crop Yield Prediction Per Country</h1>
      <h4 class="text-center text-warning mb-4">Enter the details below to get the predicted yield</h4>

      <form action="/predict" method="post">
        <input type="number" class="form-control" name="Year" placeholder="Year" value="2013" step="any" required>
        <input type="number" class="form-control" name="average_rain_fall_mm_per_year" placeholder="Average Rainfall (mm/year)" step="any" required>
        <input type="number" class="form-control" name="pesticides_tonnes" placeholder="Pesticides (Tonnes)" step="any" required>
        <input type="number" class="form-control" name="avg_temp" placeholder="Average Temperature (°C)" step="any" required>
        <input type="text" class="form-control" name="Area" placeholder="Country" required>
        <input type="text" class="form-control" name="Item" placeholder="Crop Item" required>
        <div class="text-center">
          <button type="submit" class="btn btn-danger btn-lg mt-3">🔍 Predict Yield</button>
        </div>
      </form>

      {% if prediction %}
        <div class="prediction-container">
          🌱 Predicted Yield: <strong>{{ prediction }} hg/hectare</strong>
        </div>
      {% endif %}

      {% if error %}
        <div class="error-message text-center">
          {{ error }}
        </div>
      {% endif %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
