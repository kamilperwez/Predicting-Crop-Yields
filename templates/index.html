<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>YieldAI | Crop Prediction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url("{{ url_for('static', filename='backgr.jpg') }}");
            background-size: cover;
            background-attachment: fixed;
            color: white;
            min-height: 100vh;
        }
        .glass-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            margin-top: 50px;
        }
        .form-control, .form-select {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 12px;
        }
        .btn-predict {
            background-color: #28a745;
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: bold;
            color: white;
        }
        .result-card {
            background: white;
            color: #333;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container pb-5">
        <div class="glass-container">
            <h1 class="text-center text-success mb-4">🌾 Global Crop Yield Predictor</h1>
            
            <div class="row">
                <div class="col-md-6">
                    <form action="/predict" method="post">
                        <div class="row g-3">
                            <div class="col-md-12">
                                <label class="form-label text-warning">Select Country</label>
                                <select class="form-select" name="Area" required>
                                    {% for area in areas %}
                                    <option value="{{ area }}" {% if last_input and last_input['Area'] == area %}selected{% endif %}>{{ area }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-12">
                                <label class="form-label text-warning">Select Crop</label>
                                <select class="form-select" name="Item" required>
                                    {% for item in items %}
                                    <option value="{{ item }}" {% if last_input and last_input['Item'] == item %}selected{% endif %}>{{ item }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Year</label>
                                <input type="number" class="form-control" name="Year" value="{{ last_input['Year'] if last_input else 2013 }}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Avg Temp (°C)</label>
                                <input type="number" step="any" class="form-control" name="avg_temp" placeholder="e.g. 16.5" required>
                            </div>
                            <div class="col-md-12">
                                <label class="form-label">Rainfall (mm/year)</label>
                                <input type="number" step="any" class="form-control" name="average_rain_fall_mm_per_year" required>
                            </div>
                            <div class="col-md-12">
                                <label class="form-label">Pesticides (Tonnes)</label>
                                <input type="number" step="any" class="form-control" name="pesticides_tonnes" required>
                            </div>
                            <div class="col-12 mt-4">
                                <button type="submit" class="btn btn-predict w-100">🔍 Predict Yield</button>
                            </div>
                        </div>
                    </form>
                </div>

                <div class="col-md-6 mt-4 mt-md-0">
                    {% if prediction %}
                    <div class="result-card shadow-lg animate__animated animate__fadeIn">
                        <h4 class="text-muted">Predicted Yield</h4>
                        <h2 class="display-4 fw-bold text-success">{{ prediction }} <small class="fs-6 text-dark">hg/ha</small></h2>
                        <hr>
                        <canvas id="yieldChart"></canvas>
                    </div>
                    {% elif error %}
                    <div class="alert alert-danger">{{ error }}</div>
                    {% else %}
                    <div class="h-100 d-flex align-items-center justify-content-center text-center opacity-50">
                        <p>Fill in the agricultural data to generate a yield forecast.</p>
                    </div>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>

    {% if prediction %}
    <script>
        const ctx = document.getElementById('yieldChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Forecasted Yield'],
                datasets: [{
                    label: 'Yield (hg/ha)',
                    data: [{{ prediction }}],
                    backgroundColor: '#28a745',
                    borderRadius: 10
                }]
            },
            options: { scales: { y: { beginAtZero: true } } }
        });
    </script>
    {% endif %}
</body>
</html>
